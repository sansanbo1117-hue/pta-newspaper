<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTA新聞メーカー WAKU-WAKU</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f3ec; margin: 0; color: #1f2926; }
    .wrap { max-width: 880px; margin: 0 auto; padding: 48px 20px; }
    .card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 14px 40px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px; font-size: 36px; }
    p { line-height: 1.8; color: #52615b; }
    .upload { border: 2px dashed #d47e59; border-radius: 20px; padding: 28px; margin-top: 24px; background: #fff8f1; }
    input { font-size: 16px; margin: 16px 0; }
    button { background: #1f2926; color: white; border: 0; border-radius: 999px; padding: 14px 24px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    #message { margin-top: 20px; font-weight: 700; }
    a.download { display: inline-block; margin-top: 16px; background: #d47e59; color: white; padding: 14px 24px; border-radius: 999px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PTA新聞メーカー<br>WAKU-WAKU</h1>
      <p>Excelテンプレートをアップロードすると、A3横向きのPTA新聞PDFを自動生成します。</p>
      <div class="upload">
        <form id="uploadForm">
          <label for="file">Excelファイル（.xlsx / .xlsm）を選択してください</label><br>
          <input type="file" id="file" name="file" accept=".xlsx,.xlsm" required><br>
          <button type="submit">PDFを生成する</button>
        </form>
        <div id="message"></div>
        <div id="downloadArea"></div>
      </div>
    </div>
  </div>
  <script>
    const form = document.getElementById('uploadForm');
    const message = document.getElementById('message');
    const downloadArea = document.getElementById('downloadArea');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('file').files[0];
      if (!file) return;
      message.textContent = 'PDFを生成しています。少しお待ちください...';
      downloadArea.innerHTML = '';
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || '生成に失敗しました');
        message.textContent = 'PDFが生成されました。';
        downloadArea.innerHTML = `<a class="download" href="${data.pdfUrl}">PDFをダウンロード</a>`;
      } catch (err) {
        message.textContent = 'エラー：' + err.message;
      }
    });
  </script>
</body>
</html>
